# docker-compose.yml
#
# Brings up the full Peerlane mesh:
#   - 4 agent containers (each runs its own AXL node + matching Node.js agent)
#   - 1 frontend container (served via Vite preview)
#
# A shared named volume `mesh` holds:
#   /data/registry    — mesh-registry.json used for pubkey rendezvous
#   /data/keys        — persistent ed25519 identities per role
#   /data/logs        — AXL node logs
#
# This means keys persist across restarts, which keeps pubkeys stable —
# useful for demos.

services:
  coord:
    build: { context: . }
    environment:
      ROLE: coord
      AXL_API_PORT: 9002
      COORD_HTTP_PORT: 8080
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      PEERLANE_MOCK_LLM: ${PEERLANE_MOCK_LLM:-}
    ports:
      - "8080:8080"       # HTTP+WS for frontend
      - "7001:7001"       # AXL listener (so research/verify/analyst can peer)
    volumes:
      - mesh:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/status >/dev/null && curl -fs http://localhost:9002/topology >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  research:
    build: { context: . }
    environment:
      ROLE: research
      AXL_API_PORT: 9012
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      PEERLANE_MOCK_LLM: ${PEERLANE_MOCK_LLM:-}
    volumes:
      - mesh:/data
    depends_on:
      coord:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:$${AXL_API_PORT}/topology >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  verify:
    build: { context: . }
    environment:
      ROLE: verify
      AXL_API_PORT: 9022
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      PEERLANE_MOCK_LLM: ${PEERLANE_MOCK_LLM:-}
    volumes:
      - mesh:/data
    depends_on:
      coord:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:$${AXL_API_PORT}/topology >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  analyst:
    build: { context: . }
    environment:
      ROLE: analyst
      AXL_API_PORT: 9032
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      PEERLANE_MOCK_LLM: ${PEERLANE_MOCK_LLM:-}
    volumes:
      - mesh:/data
    depends_on:
      coord:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:$${AXL_API_PORT}/topology >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      coord:
        condition: service_healthy

volumes:
  mesh:
